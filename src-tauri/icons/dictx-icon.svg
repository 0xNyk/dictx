<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#09090b"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="1016" height="1016" rx="218" ry="218" fill="none" stroke="#27272a" stroke-width="4"/>

  <!-- Audio waveform bars - 7 bars, symmetric heights -->
  <!-- Bar 1 (left) -->
  <rect x="222" y="432" width="48" height="160" rx="24" fill="url(#wave)" opacity="0.7"/>
  <!-- Bar 2 -->
  <rect x="312" y="332" width="48" height="360" rx="24" fill="url(#wave)" opacity="0.8"/>
  <!-- Bar 3 -->
  <rect x="402" y="252" width="48" height="520" rx="24" fill="url(#wave)" opacity="0.9"/>
  <!-- Bar 4 (center, tallest) -->
  <rect x="492" y="192" width="48" height="640" rx="24" fill="url(#wave)"/>
  <!-- Bar 5 -->
  <rect x="582" y="272" width="48" height="480" rx="24" fill="url(#wave)" opacity="0.9"/>
  <!-- Bar 6 -->
  <rect x="672" y="352" width="48" height="320" rx="24" fill="url(#wave)" opacity="0.8"/>
  <!-- Bar 7 (right) -->
  <rect x="762" y="412" width="48" height="200" rx="24" fill="url(#wave)" opacity="0.7"/>

  <!-- Subtle glow effect behind center bars -->
  <ellipse cx="516" cy="512" rx="200" ry="300" fill="url(#glow)"/>
</svg>
